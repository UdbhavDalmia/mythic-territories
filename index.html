<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mythic Territories - Main Menu</title>
    <link rel="stylesheet" href="styles/menu.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background: url('images/menu-bg.png') center/cover fixed;
            font-family: 'Georgia', serif;
            padding: 20px;
            overflow-y: auto;
            color: #f0f0f0;
            margin: 0;
        }
    </style>
</head>
<body class="primal-home">
    <div class="game-title" id="main-title">MYTHIC TERRITORIES</div>
    <div class="primal-menu-layout">
        <div class="menu-shard snow-shard primal-snow">
            <div class="team-selection">
                <div class="team-card" id="team-snow">
                    <img src="units/frost-lord.png" alt="Snow Team">
                    <h3>Snow</h3>
                </div>
            </div>
            <div class="main-options">
                <button id="rules-btn" class="menu-btn">Game Rules</button>
            </div>
        </div>

        <div class="menu-shard ash-shard primal-ash">
            <div class="team-selection">
                <div class="team-card" id="team-ash">
                    <img src="units/ash-tyrant.png" alt="Ash Team">
                    <h3>Ash</h3>
                </div>
            </div>
            <div class="main-options">
                <button id="notes-btn" class="menu-btn">Patch Notes</button>
            </div>
        </div>
    </div>

    <div class="ui-container dark-glass-container" style="max-width: 500px; margin-top: 20px; width: 100%;">
        <div class="start-options">
            <button id="play-human-btn" class="menu-btn" disabled>Pass and Play</button>
            <button id="play-ai-btn" class="menu-btn" disabled>Challenge the Architect</button>
        </div>
    </div>

    <script src="menu.js"></script>
</body>

</html>
