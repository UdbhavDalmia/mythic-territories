<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Simple snowy 0-badge: circle with subtle irregularities and a white 0 -->
  <defs>
    <radialGradient id="g1" cx="40%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#dff3ff" />
      <stop offset="55%" stop-color="#8fcfff" />
      <stop offset="100%" stop-color="#5fb4ff" />
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.35" />
    </filter>
  </defs>

  <!-- base circle -->
  <g filter="url(#shadow)">
    <circle cx="64" cy="64" r="54" fill="url(#g1)" />
  </g>

  <!-- subtle irregularities: tiny ice chips / notches -->
  <path d="M31 40c2-6 12-12 20-10" stroke="#dff3ff" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M96 34c6 4 8 12 6 20" stroke="#cfeeff" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.45"/>
  <path d="M38 96c-6-4-8-12-6-20" stroke="#e8f9ff" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M86 98c-4 6-12 8-20 6" stroke="#cfeeff" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.45"/>

  <!-- faint inner frost texture -->
  <g opacity="0.24" fill="#ffffff">
    <circle cx="64" cy="64" r="42" />
    <circle cx="64" cy="64" r="38" fill-opacity="0.0" stroke="#f6fcff" stroke-width="1" />
  </g>

  <!-- highlight crescent -->
  <path d="M36 44c8-18 32-28 52-18c-12-2-36 2-52 18z" fill="#ffffff" opacity="0.12" />

  <!-- numeral 0 (white) with subtle inner stroke to keep it readable on any background -->
  <g filter="url(#softGlow)">
    <text x="64" y="76" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="48" font-weight="700" text-anchor="middle" fill="#ffffff">0</text>
    <text x="64" y="76" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="48" font-weight="700" text-anchor="middle" fill="none" stroke="#bfe6ff" stroke-width="1" opacity="0.35" paint-order="stroke"/>
  </g>

  <!-- thin white rim -->
  <circle cx="64" cy="64" r="54" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2" />
</svg>
