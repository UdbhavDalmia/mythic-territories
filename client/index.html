<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/png" href="images/favicon.ico">
  <title>Mythic Territories</title>
  <meta name="description"
    content="Experience Mythic Territories, a premium turn-based strategy game. Command powerful elemental leaders, master unique faction abilities, and battle for dominion in an immersive cinematic arena.">
  <link rel="canonical" href="https://mythic-territories.xyz/">
  <meta property="og:site_name" content="Mythic Territories">
  <meta property="og:title" content="Mythic Territories">
  <meta property="og:description"
    content="Command the elemental forces of Snow or Ash in this tactical turn-based strategy game.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://mythic-territories.xyz/">
  <link rel="stylesheet" href="styles/menu.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@700&family=Exo+2:wght@400;600;700&family=Rajdhani:wght@600;700&display=swap"
    rel="stylesheet">
</head>

<body class="primal-home">
  <h1 class="game-title" id="main-title">Mythic Territories</h1>

  <div class="clash-container">
    <div class="menu-shard snow-clash primal-snow" id="team-snow">
      <div class="leader-portrait">
        <img src="images/leaders/snow_leader_clash.png" alt="Frost Lord">
      </div>
      <div class="faction-details">
        <h2>FROST LORD</h2>
        <button id="rules-btn" class="menu-btn">Rules</button>
      </div>
    </div>

    <div class="menu-shard ash-clash primal-ash" id="team-ash">
      <div class="leader-portrait">
        <img src="images/leaders/ash_leader_clash.png" alt="Ash Tyrant">
      </div>
      <div class="faction-details">
        <h2>ASH TYRANT</h2>
        <button id="notes-btn" class="menu-btn">Notes</button>
      </div>
    </div>
  </div>

  <div class="play-nexus">
    <div class="nexus-glass">
      <button class="menu-btn play-btn" id="localPlayBtn">Pass & Play</button>
      <button class="menu-btn play-btn highlight-btn" id="multiplayerBtn">Enter Multiplayer</button>
    </div>
  </div>

  <div id="roomModal" class="modal hidden">
    <div class="modal-content">
      <h2>Join or Create Room</h2>
      <p>Enter a unique Room Code to play with a friend. If it doesn't exist, we'll create it!</p>
      <input type="text" id="roomCodeInput" placeholder="e.g., BATTLE99" maxlength="12" autocomplete="off"
        spellcheck="false" />
      <div class="modal-buttons-row">
        <button class="menu-btn small-btn" id="joinRoomBtn">Join Room</button>
        <button class="menu-btn small-btn cancel-btn" id="closeModalBtn">Cancel</button>
      </div>
    </div>
  </div>

  <canvas id="background-effects-canvas"></canvas>
  <script src="js/menu.js"></script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Mythic Territories",
      "url": "https://mythic-territories.xyz/"
    }
</script>

</body>

</html>
